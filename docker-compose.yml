version: "3.8"
services:
  frontend:
    build: ./frontend
    container_name: frontend
    env_file: .env
    ports:
      - ${FRONTEND_PORT}:${FRONTEND_PORT}

  backend:
    build: ./backend
    container_name: backend
    env_file: .env
    ports:
      - ${BACKEND_PORT}:${BACKEND_PORT}

  database:
    image: mongo:latest
    container_name: database
    env_file: .env
    volumes:
      - link24-db:/data/db
      - link24-db:/data/configdbs
    ports:
      - ${DB_PORT}:27017

volumes:
  link24-db:
  link24-config-db:
